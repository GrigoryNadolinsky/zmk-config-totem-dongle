CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_ZMK_SLEEP=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Включаем RGB подсветку через GPIO (bit-bang)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_GPIO=y
CONFIG_ZMK_RGB_UNDERGLOW_NUM_PIXELS=1
CONFIG_ZMK_RGB_UNDERGLOW_COLOR_ORDER_GRB=y
CONFIG_ZMK_RGB_UNDERGLOW_DEFAULT_VAL=255  # Яркость 0–255
CONFIG_ZMK_RGB_UNDERGLOW_DEFAULT_HUE=180  # Цвет (напр. синий)
CONFIG_ZMK_RGB_UNDERGLOW_DEFAULT_SAT=255
CONFIG_ZMK_RGB_UNDERGLOW_DEFAULT_EFFECT=NONE
